<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio Digital</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f6f3ff;
}

header{
background:linear-gradient(45deg,#6a00ff,#a64dff);
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
padding:15px;
}

.produto{
background:white;
border-radius:10px;
padding:10px;
margin-bottom:15px;
display:flex;
gap:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.produto img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
}

.info{
flex:1;
}

button{
background:#7b2cff;
color:white;
border:none;
padding:8px 10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5a00d6;
}

#carrinho{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

.admin{
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:8px;
border-radius:6px;
}

.painel{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:white;
overflow:auto;
padding:20px;
}

input{
width:100%;
padding:8px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
🍔 Meu Cardápio
</header>

<div class="admin" onclick="abrirAdmin()">
⚙️ Painel
</div>

<div class="container" id="cardapio"></div>

<div id="carrinho">
<b>Carrinho:</b>
<span id="total">0</span> itens
<button onclick="finalizar()">Finalizar Pedido</button>
</div>

<div class="painel" id="painel">

<h2>Painel do Dono</h2>

<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="foto" placeholder="URL da foto">

<button onclick="addProduto()">Adicionar Produto</button>

<hr>

<button onclick="fecharAdmin()">Fechar</button>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [

{
nome:"Coxinha",
preco:3,
foto:"https://i.imgur.com/V6Q0L3C.png"
},

{
nome:"Pastel",
preco:4,
foto:"https://i.imgur.com/3XK4XyP.png"
}

]

let carrinho = []

function render(){

let html=""

produtos.forEach((p,i)=>{

html+=`
<div class="produto">

<img src="${p.foto}">

<div class="info">

<h3>${p.nome}</h3>

<p>R$ ${p.preco}</p>

<button onclick="comprar(${i})">
Adicionar
</button>

</div>

</div>
`

})

document.getElementById("cardapio").innerHTML=html

}

render()

function comprar(i){

carrinho.push(produtos[i])

document.getElementById("total").innerText=carrinho.length

}

function finalizar(){

let mensagem="Pedido:%0A"

carrinho.forEach(p=>{

mensagem+=p.nome+" - R$"+p.preco+"%0A"

})

window.open("https://wa.me/5591999999999?text="+mensagem)

}

function abrirAdmin(){

let senha=prompt("Digite a senha")

if(senha=="1234"){

document.getElementById("painel").style.display="block"

}

}

function fecharAdmin(){

document.getElementById("painel").style.display="none"

}

function addProduto(){

let nome=document.getElementById("nome").value

let preco=document.getElementById("preco").value

let foto=document.getElementById("foto").value

produtos.push({nome,preco,foto})

localStorage.setItem("produtos",JSON.stringify(produtos))

render()

alert("Produto adicionado!")

}

</script>

</body>
</html>
