<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Restaurante e Conv. da Fátima</title>

<style>

:root{
--corPrincipal:#d62828;
--corBotao:#2a9d8f;
--corFundo:#f5f5f5;
}

body{
margin:0;
font-family:Arial;
background:var(--corFundo);
}

header{
background:var(--corPrincipal);
color:white;
padding:15px;
text-align:center;
position:relative;
}

#menuAdmin{
position:absolute;
right:15px;
top:10px;
font-size:25px;
cursor:pointer;
}

#capa{
width:100%;
height:200px;
background-size:cover;
background-position:center;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:10px;
margin-bottom:15px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:10px;
}

button{
background:var(--corBotao);
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:8px;
}

input,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

#carrinho{
background:white;
padding:15px;
border-radius:10px;
margin-top:20px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.remover{
color:red;
cursor:pointer;
}

#admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

#painel{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:10px;
max-height:90%;
overflow:auto;
}

</style>

</head>

<body>

<header>

<h2>🍽 Restaurante e Conv. da Fátima</h2>

<div id="menuAdmin" onclick="abrirAdmin()">⋮</div>

</header>

<div id="capa"></div>

<div class="container">

<h3>Informações do cliente</h3>

<input id="nome" placeholder="Seu nome">

<input id="endereco" placeholder="Rua / Travessa">

<input id="numero" placeholder="Número da residência">

<textarea id="obs" placeholder="Observação"></textarea>

<div id="cardapio"></div>

<div id="carrinho">

<h3>🛒 Carrinho</h3>

<div id="lista"></div>

<p>Total: R$ <span id="total">0</span></p>

<button onclick="enviarPedido()">Enviar Pedido</button>

</div>

</div>

<div id="admin">

<div id="painel">

<h3>Painel do Dono</h3>

<input id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="controle" style="display:none">

<h4>Nova refeição</h4>

<input id="nomeComida" placeholder="Nome">

<input id="precoComida" placeholder="Preço">

<input id="fotoComida" placeholder="Link da foto">

<button onclick="addComida()">Adicionar</button>

<h4>Nova categoria</h4>

<input id="categoriaNome" placeholder="Nome da categoria">

<button onclick="addCategoria()">Criar</button>

<h4>Alterar cores</h4>

<input id="corPrincipal" type="color">

<input id="corBotao" type="color">

<input id="corFundo" type="color">

<button onclick="salvarCores()">Salvar cores</button>

<h4>Alterar capa</h4>

<input id="novaCapa" placeholder="Link da imagem">

<button onclick="trocarCapa()">Salvar capa</button>

</div>

<button onclick="fecharAdmin()">Fechar</button>

</div>

</div>

<script>

let senhaCorreta="120990"

let pedido=[]
let total=0

let dados=JSON.parse(localStorage.getItem("menu")) || {

categorias:{
"Refeições":[
{nome:"Chapa Mista",preco:20,foto:"https://images.unsplash.com/photo-1604908176997-431c3b3bdf77"},
{nome:"Empanado",preco:18,foto:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},
{nome:"Bife Acebolado",preco:18,foto:"https://images.unsplash.com/photo-1555939594-58d7cb561ad1"},
{nome:"Cozidão",preco:22,foto:"https://images.unsplash.com/photo-1544025162-d76694265947"},
{nome:"Assado de Panela",preco:22,foto:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{nome:"Vatapá",preco:15,foto:"https://images.unsplash.com/photo-1586190848861-99aa4a171e90"}
]
}

}

function salvar(){

localStorage.setItem("menu",JSON.stringify(dados))

}

function render(){

let area=document.getElementById("cardapio")

area.innerHTML=""

for(let cat in dados.categorias){

area.innerHTML+="<h2>"+cat+"</h2>"

dados.categorias[cat].forEach((comida,i)=>{

area.innerHTML+=`

<div class="card">

<img src="${comida.foto}">

<div class="info">

<h3>${comida.nome}</h3>

<p>R$ ${comida.preco}</p>

<button onclick="addCarrinho('${comida.nome}',${comida.preco})">Adicionar</button>

</div>

</div>

`

})

}

}

function addCarrinho(nome,preco){

pedido.push({nome,preco})

total+=preco

atualizarCarrinho()

}

function atualizarCarrinho(){

let lista=document.getElementById("lista")

lista.innerHTML=""

pedido.forEach((item,i)=>{

lista.innerHTML+=`

<div class="item">

${item.nome} - R$ ${item.preco}

<span class="remover" onclick="removerItem(${i})">X</span>

</div>

`

})

document.getElementById("total").innerText=total

}

function removerItem(i){

total-=pedido[i].preco

pedido.splice(i,1)

atualizarCarrinho()

}

function enviarPedido(){

let nome=document.getElementById("nome").value
let endereco=document.getElementById("endereco").value
let numero=document.getElementById("numero").value
let obs=document.getElementById("obs").value

let msg="Pedido Restaurante da Fátima%0A%0A"

msg+="Cliente: "+nome+"%0A"

msg+="Endereço: "+endereco+" Nº "+numero+"%0A%0A"

msg+="Pedido:%0A"

pedido.forEach(i=>{

msg+="- "+i.nome+"%0A"

})

msg+="%0ATotal: R$ "+total+"%0A"

msg+="Obs: "+obs

window.open("https://wa.me/5591986243010?text="+msg)

}

function abrirAdmin(){

document.getElementById("admin").style.display="flex"

}

function fecharAdmin(){

document.getElementById("admin").style.display="none"

}

function login(){

if(document.getElementById("senha").value===senhaCorreta){

document.getElementById("controle").style.display="block"

}else{

alert("Senha incorreta")

}

}

function addComida(){

let nome=document.getElementById("nomeComida").value
let preco=document.getElementById("precoComida").value
let foto=document.getElementById("fotoComida").value

dados.categorias["Refeições"].push({nome,preco,foto})

salvar()

render()

}

function addCategoria(){

let nome=document.getElementById("categoriaNome").value

dados.categorias[nome]=[]

salvar()

render()

}

function salvarCores(){

let corPrincipal=document.getElementById("corPrincipal").value
let corBotao=document.getElementById("corBotao").value
let corFundo=document.getElementById("corFundo").value

document.documentElement.style.setProperty('--corPrincipal',corPrincipal)
document.documentElement.style.setProperty('--corBotao',corBotao)
document.documentElement.style.setProperty('--corFundo',corFundo)

localStorage.setItem("cores",JSON.stringify({corPrincipal,corBotao,corFundo}))

}

function carregarCores(){

let cores=JSON.parse(localStorage.getItem("cores"))

if(cores){

document.documentElement.style.setProperty('--corPrincipal',cores.corPrincipal)
document.documentElement.style.setProperty('--corBotao',cores.corBotao)
document.documentElement.style.setProperty('--corFundo',cores.corFundo)

}

}

function trocarCapa(){

let capa=document.getElementById("novaCapa").value

document.getElementById("capa").style.backgroundImage="url("+capa+")"

localStorage.setItem("capa",capa)

}

function carregarCapa(){

let capa=localStorage.getItem("capa")

if(capa){

document.getElementById("capa").style.backgroundImage="url("+capa+")"

}

}

carregarCores()
carregarCapa()
render()
  function mostrarFila(){

let lista=document.getElementById("filaPedidos")

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]

pedidos.sort((a,b)=>a.tempo-b.tempo)

lista.innerHTML=""

pedidos.forEach((p,i)=>{

lista.innerHTML+=`

<div class="pedido">

<b>Prioridade:</b> ${i+1}<br>
<b>Cliente:</b> ${p.cliente}<br>
<b>Endereço:</b> ${p.endereco}, ${p.numero}<br>
<b>Hora:</b> ${p.hora}<br>
<b>Itens:</b> ${p.itens.map(i=>i.nome).join(", ")}

</div>

`

})

}
  setInterval(mostrarFila,3000)

</script>

</body>
</html>
