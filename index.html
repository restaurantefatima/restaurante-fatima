<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Restaurante e Conv. da Fátima</title>

<style>

:root{
--roxo:#6a0dad;
--lilas:#b784f7;
--fundo:#f6f2ff;
--botao:#7b2cbf;
}

body{
margin:0;
font-family:Arial;
background:var(--fundo);
}

header{
background:linear-gradient(90deg,var(--roxo),var(--lilas));
color:white;
padding:15px;
font-size:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

#adminBtn{
font-size:24px;
cursor:pointer;
}

#capa{
height:180px;
background-size:cover;
background-position:center;
}

#abas{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
gap:10px;
}

#abas button{
background:#eee;
border:none;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.info{
padding:10px;
}

button{
background:var(--botao);
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:6px;
}

#carrinho{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

#admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

#painel{
background:white;
padding:20px;
width:90%;
max-width:400px;
max-height:90%;
overflow:auto;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-bottom:8px;
}

.pedido{
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

🍽 Restaurante e Conv. da Fátima

<div id="adminBtn" onclick="abrirAdmin()">⋮</div>

</header>

<div id="capa"></div>

<div id="abas"></div>

<div class="container">

<h3>Dados do cliente</h3>

<input id="nome" placeholder="Nome">

<input id="endereco" placeholder="Endereço">

<input id="numero" placeholder="Número da casa">

<button onclick="pegarLocalizacao()">Usar minha localização 📍</button>

<div id="cardapio"></div>

</div>

<div id="carrinho">

<b>Total: R$ <span id="total">0</span></b>

<button onclick="enviarPedido()">Enviar Pedido</button>

</div>

<div id="admin">

<div id="painel">

<h3>Painel do Dono</h3>

<input id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="controle" style="display:none">

<h4>Adicionar refeição</h4>

<input id="nomeComida" placeholder="Nome">

<input id="precoComida" placeholder="Preço">

<input id="fotoComida" placeholder="Link da foto">

<select id="categoriaSelect"></select>

<button onclick="addComida()">Adicionar</button>

<h4>Editar foto existente</h4>

<input id="nomeEditar" placeholder="Nome da refeição">

<input id="novaFoto" placeholder="Nova foto">

<button onclick="editarFoto()">Salvar foto</button>

<h4>Fila de pedidos</h4>

<div id="filaPedidos"></div>

</div>

<button onclick="fecharAdmin()">Fechar</button>

</div>

</div>

<script>

let senhaCorreta="120990"

let carrinho=[]
let total=0

let dados=JSON.parse(localStorage.getItem("menu"))||{
  
  if(dados.categorias["Refeições"]){
mostrarCategoria("Refeições")
}
let dados=JSON.parse(localStorage.getItem("menu"))||{

categorias:{
"Refeições":[
{nome:"Chapa mista",preco:20,foto:"https://via.placeholder.com/400"},
{nome:"Empanado",preco:18,foto:"https://via.placeholder.com/400"},
{nome:"Bife acebolado",preco:18,foto:"https://via.placeholder.com/400"},
{nome:"Cozidão",preco:22,foto:"https://via.placeholder.com/400"},
{nome:"Assado de panela",preco:22,foto:"https://via.placeholder.com/400"},
{nome:"Vatapá",preco:15,foto:"https://via.placeholder.com/400"}
]

}

}
]
}

}

function salvar(){

localStorage.setItem("menu",JSON.stringify(dados))

}

function carregarAbas(){

let abas=document.getElementById("abas")

abas.innerHTML=""

for(let cat in dados.categorias){

abas.innerHTML+=<button onclick="mostrarCategoria('${cat}')">${cat}</button>

}

let select=document.getElementById("categoriaSelect")

select.innerHTML=""

for(let cat in dados.categorias){

select.innerHTML+=<option>${cat}</option>

}

}

function mostrarCategoria(cat){

let area=document.getElementById("cardapio")

area.innerHTML=""

dados.categorias[cat].forEach(comida=>{

area.innerHTML+=`

<div class="card">

<img src="${comida.foto}">

<div class="info">

<h3>${comida.nome}</h3>

<p>R$ ${comida.preco}</p>

<button onclick="addCarrinho('${comida.nome}',${comida.preco})">

Adicionar

</button>

</div>

</div>

`

})

}

function addCarrinho(nome,preco){

carrinho.push({nome,preco})

total+=preco

document.getElementById("total").innerText=total

}

function enviarPedido(){

let nome=document.getElementById("nome").value
let endereco=document.getElementById("endereco").value
let numero=document.getElementById("numero").value

let pedido={

cliente:nome,
endereco:endereco,
numero:numero,
itens:carrinho,
tempo:Date.now()

}

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]

pedidos.push(pedido)

localStorage.setItem("pedidos",JSON.stringify(pedidos))

let msg="Pedido Restaurante da Fátima%0A"

carrinho.forEach(i=>{

msg+="- "+i.nome+"%0A"

})

window.open("https://wa.me/5591986243010?text="+msg)

}

function mostrarFila(){

let lista=document.getElementById("filaPedidos")

let pedidos=JSON.parse(localStorage.getItem("pedidos"))||[]

pedidos.sort((a,b)=>a.tempo-b.tempo)

lista.innerHTML=""

pedidos.forEach((p,i)=>{

lista.innerHTML+=`

<div class="pedido">

<b>Prioridade:</b> ${i+1}<br>
Cliente: ${p.cliente}

</div>

`

})

}

function pegarLocalizacao(){

navigator.geolocation.getCurrentPosition(function(pos){

alert("Localização capturada")

})

}

function abrirAdmin(){

document.getElementById("admin").style.display="flex"

}

function fecharAdmin(){

document.getElementById("admin").style.display="none"

}

function login(){

if(document.getElementById("senha").value===senhaCorreta){

document.getElementById("controle").style.display="block"

}

}

function addComida(){

let nome=document.getElementById("nomeComida").value
let preco=document.getElementById("precoComida").value
let foto=document.getElementById("fotoComida").value
let cat=document.getElementById("categoriaSelect").value

dados.categorias[cat].push({nome,preco,foto})

salvar()

carregarAbas()

}

function editarFoto(){

let nome=document.getElementById("nomeEditar").value
let nova=document.getElementById("novaFoto").value

for(let cat in dados.categorias){

dados.categorias[cat].forEach(item=>{

if(item.nome==nome){

item.foto=nova

}

})

}

salvar()

}

carregarAbas()

mostrarCategoria("Refeições")

setInterval(mostrarFila,3000)

</script>

</body>
</html>
