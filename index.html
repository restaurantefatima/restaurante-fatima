<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio Digital</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f0ff;
}

header{
background:linear-gradient(45deg,#6a00ff,#b266ff);
color:white;
padding:20px;
font-size:24px;
text-align:center;
}

.container{
padding:15px;
}

.produto{

background:white;
border-radius:12px;
margin-bottom:15px;
display:flex;
gap:12px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

.produto img{

width:90px;
height:90px;
border-radius:10px;
object-fit:cover;

}

.info{
flex:1;
}

.preco{

color:#6a00ff;
font-weight:bold;

}

button{

background:#6a00ff;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;

}

#carrinho{

position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:12px;
box-shadow:0 -4px 10px rgba(0,0,0,0.2);
display:flex;
justify-content:space-between;
align-items:center;

}

</style>

</head>

<body>

<header>
🍽️ Cardápio do Restaurante
</header>

<div class="container">

<div class="produto">

<img src="9752.jpg">

<div class="info">

<h3>Vatapá</h3>

<p>Delicioso vatapá acompanhado de arroz</p>

<p class="preco">R$ 10,00</p>

<button onclick="add('Vatapá',10)">
Adicionar
</button>

</div>
</div>

<div class="produto">

<img src="9739.jpg">

<div class="info">

<h3>Chapa Mista</h3>

<p>Arroz, feijão, macarrão e carne na chapa</p>

<p class="preco">R$ 15,00</p>

<button onclick="add('Chapa Mista',15)">
Adicionar
</button>

</div>
</div>

<div class="produto">

<img src="340.jpg">

<div class="info">

<h3>Empanado</h3>

<p>Empanado com arroz, feijão e macarrão</p>

<p class="preco">R$ 10,00</p>

<button onclick="add('Empanado',10)">
Adicionar
</button>

</div>
</div>

</div>

<div id="carrinho">

<span id="itens">Carrinho vazio</span>

<button onclick="pedido()">
Fazer pedido
</button>

</div>

<script>

let carrinho=[]

function add(nome,preco){

carrinho.push({nome,preco})

document.getElementById("itens").innerText=
carrinho.length+" item(s) no carrinho"

}

function pedido(){

if(carrinho.length==0){

alert("Adicione um item primeiro")

return

}

let texto="Pedido:%0A"

let total=0

carrinho.forEach(p=>{

texto+=p.nome+" - R$"+p.preco+"%0A"

total+=p.preco

})

texto+="%0ATotal: R$"+total

window.open("https://wa.me/5591999999999?text="+texto)

}

</script>

</body>
</html>
